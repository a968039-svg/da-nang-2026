<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 峴港・會安自主遊 APP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --dark: #2F2F2F;
            --light: #F7F9FA;
            --card-bg: #FFFFFF;
            --link-color: #1A73E8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            min-height: 100vh;
            padding-bottom: 70px;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #FF8E53);
            color: white;
            padding: 20px 15px;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        header h1 { font-size: 1.4rem; margin-bottom: 5px; }
        header p { font-size: 0.9rem; opacity: 0.9; }

        .tabs {
            display: flex;
            overflow-x: auto;
            background: white;
            padding: 10px 5px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #EFEFEF;
        }

        .tab-btn {
            flex: 0 0 auto;
            padding: 8px 16px;
            margin: 0 5px;
            border: none;
            background: #F0F2F5;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #65676B;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .content-section {
            display: none;
            padding: 15px;
        }

        .content-section.active {
            display: block;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #F0F2F5;
            padding-bottom: 8px;
        }

        .time-block {
            margin-bottom: 12px;
        }

        .time-tag {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        /* 地圖導航連結樣式 */
        .map-link {
            color: var(--link-color);
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .map-link:hover {
            text-decoration: underline;
        }
        .map-link i {
            font-size: 0.85rem;
        }

        .info-list {
            list-style: none;
        }

        .info-list li {
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .info-list i { color: #888; margin-top: 3px; }
        .info-list .fa-map-marker-alt { color: #EA4335; }
